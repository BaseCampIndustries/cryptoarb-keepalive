name: keepalive
on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping cryptoarb to prevent Render free-tier sleep
        run: |
          for i in 1 2 3 4; do
            code=$(curl -sS -o /dev/null -w "%{http_code}" --max-time 60 https://cryptoarb.onrender.com/ || echo "000")
            echo "Attempt $i -> HTTP $code"
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 30
          done
          echo "No 200 yet (likely cold-starting); ping sent, marking success."
